name: Reusable TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        default: '20'
        type: string
      install-command:
        description: 'Command to install dependencies'
        required: false
        default: 'npm ci'
        type: string
      test-command:
        description: 'Command to run tests'
        required: false
        default: 'npm test'
        type: string
      build-command:
        description: 'Command to build the package'
        required: false
        default: 'npm run build'
        type: string
      working-directory:
        description: 'Directory where the package is located'
        required: false
        default: '.'
        type: string
      is-release:
        description: 'Whether to release the package'
        required: false
        default: false
        type: boolean
      is-release-candidate:
        description: 'Whether this is a release candidate'
        required: false
        default: false
        type: boolean
      run-integration:
        description: 'Whether to run integration tests'
        required: false
        default: false
        type: boolean
    secrets:
      NPM_TOKEN:
        description: 'NPM token for publishing'
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ inputs.working-directory }}/package-lock.json'

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Build package
        run: ${{ inputs.build-command }}

      - name: Run integration tests
        if: ${{ inputs.run-integration }}
        run: npm run test:integration

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ inputs.working-directory }}/dist/

  release:
    needs: ci
    if: ${{ inputs.is-release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ${{ inputs.working-directory }}/dist/

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Release v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
