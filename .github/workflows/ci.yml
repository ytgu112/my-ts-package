name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  push:
    branches: [main]

jobs:
  check-labels:
    runs-on: ubuntu-latest
    outputs:
      run-integration: ${{ steps.labels.outputs.verify }}
      is-release-candidate: ${{ steps.labels.outputs.publish }}
    steps:
      - id: labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request ? context.payload.pull_request.labels.map(l => l.name) : [];
            core.setOutput('verify', labels.includes('verify'));
            core.setOutput('publish', labels.includes('publish'));

  ci-cd:
    needs: check-labels
    uses: ./.github/workflows/reusable-ts-ci.yml
    with:
      run-integration: ${{ needs.check-labels.outputs.run-integration == 'true' }}
      is-release-candidate: ${{ needs.check-labels.outputs.is-release-candidate == 'true' }}
      is-release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
