name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  check-labels:
    runs-on: ubuntu-latest
    outputs:
      run-integration: ${{ steps.labels.outputs.verify }}
      publish: ${{ steps.labels.outputs.publish }}
      is-release: ${{ steps.labels.outputs.is-release }}
    steps:
      - id: labels
        uses: actions/github-script@v7
        with:
          script: |
            let verify = false;
            let publish = false;
            let is_release = false;

            console.log(`Event Name: ${context.eventName}`);

            if (context.eventName === 'pull_request') {
              const labels = context.payload.pull_request.labels.map(l => l.name);
              console.log(`Detected PR labels: ${JSON.stringify(labels)}`);
              verify = labels.includes('verify');
              publish = labels.includes('publish');
            } else if (context.eventName === 'push' && context.ref === 'refs/heads/main') {
              console.log(`Push to main detected. SHA: ${context.sha}`);
              
              // Get all PRs associated with this commit
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              
              console.log(`Associated PRs found: ${pullRequests.length}`);
              
              // Find the first merged PR that has the 'publish' label
              const pr = pullRequests.find(p => p.labels.some(l => l.name === 'publish'));
              
              if (pr) {
                console.log(`Found associated PR #${pr.number} with 'publish' label. State: ${pr.state}, Merged: ${pr.merged_at}`);
                is_release = true;
              } else {
                console.log('No associated PR with "publish" label found. Checking recent closed PRs as fallback...');
                // Fallback: check last 5 closed PRs if API association is slow
                const { data: recentPrs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'closed',
                  base: 'main',
                  per_page: 5
                });
                
                const matchedPr = recentPrs.find(p => (p.merge_commit_sha === context.sha || p.head.sha === context.sha) && p.labels.some(l => l.name === 'publish'));
                if (matchedPr) {
                   console.log(`Fallback found PR #${matchedPr.number} matching merge_commit_sha.`);
                   is_release = true;
                }
              }
            }

            console.log(`Final outputs - verify: ${verify}, publish: ${publish}, is-release: ${is_release}`);
            core.setOutput('verify', String(verify));
            core.setOutput('publish', String(publish));
            core.setOutput('is-release', String(is_release));

  ci-cd:
    needs: check-labels
    uses: ./.github/workflows/reusable-ts-ci.yml
    with:
      run-integration: ${{ needs.check-labels.outputs.run-integration == 'true' }}
      is-release-candidate: ${{ needs.check-labels.outputs.publish == 'true' }}
      is-release: ${{ needs.check-labels.outputs.is-release == 'true' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
