name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  check-labels:
    runs-on: ubuntu-latest
    outputs:
      run-integration: ${{ steps.labels.outputs.verify }}
      publish: ${{ steps.labels.outputs.publish }}
      is-release: ${{ steps.labels.outputs.is-release }}
    steps:
      - id: labels
        uses: actions/github-script@v7
        with:
          script: |
            let verify = false;
            let publish = false;
            let is_release = false;

            if (context.eventName === 'pull_request') {
              const labels = context.payload.pull_request.labels.map(l => l.name);
              verify = labels.includes('verify');
              publish = labels.includes('publish');
            } else if (context.eventName === 'push' && context.ref === 'refs/heads/main') {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              const pr = pullRequests.find(p => p.merge_commit_sha === context.sha);
              is_release = pr && pr.labels.some(l => l.name === 'publish');
            }

            core.setOutput('verify', verify);
            core.setOutput('publish', publish);
            core.setOutput('is-release', is_release);

  ci-cd:
    needs: check-labels
    uses: ./.github/workflows/reusable-ts-ci.yml
    with:
      run-integration: ${{ needs.check-labels.outputs.run-integration == 'true' }}
      is-release-candidate: ${{ needs.check-labels.outputs.publish == 'true' }}
      is-release: ${{ needs.check-labels.outputs.is-release == 'true' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
